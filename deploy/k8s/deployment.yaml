apiVersion: apps/v1
kind: Deployment
metadata:
  name: syd
  namespace: syd
  labels:
    app: syd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syd
  template:
    metadata:
      labels:
        app: syd
    spec:
      initContainers:
        - name: wait-for-nats
          image: busybox
          command: ['sh', '-c', 'until nc -z nats 4222; do echo "waiting for NATS"; sleep 2; done']

      containers:
        - name: syd
          # Replace with your actual registry/image:tag after building.
          # Example: ghcr.io/jalapeno/syd:latest
          image: syd:latest
          imagePullPolicy: IfNotPresent

          args:
            - --addr=:8080
            - --bmp
            - --nats-url=$(NATS_URL)
            - --bmp-topo=$(BMP_TOPO)
            - --bmp-consumer=$(BMP_CONSUMER)
            - --encap-mode=$(ENCAP_MODE)
            - --gnmi-target-map=$(GNMI_TARGET_MAP)
            - --compose=ipv4-graph=$(BMP_TOPO)-v4,$(BMP_TOPO)-peers,$(BMP_TOPO)-prefixes-v4
            - --compose=ipv6-graph=$(BMP_TOPO)-v6,$(BMP_TOPO)-peers,$(BMP_TOPO)-prefixes-v6

          env:
            - name: NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: syd-config
                  key: NATS_URL
            - name: BMP_TOPO
              valueFrom:
                configMapKeyRef:
                  name: syd-config
                  key: BMP_TOPO
            - name: BMP_CONSUMER
              valueFrom:
                configMapKeyRef:
                  name: syd-config
                  key: BMP_CONSUMER
            - name: ENCAP_MODE
              valueFrom:
                configMapKeyRef:
                  name: syd-config
                  key: ENCAP_MODE
            - name: GNMI_TARGET_MAP
              valueFrom:
                configMapKeyRef:
                  name: syd-config
                  key: GNMI_TARGET_MAP

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          readinessProbe:
            httpGet:
              path: /topology
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /topology
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
