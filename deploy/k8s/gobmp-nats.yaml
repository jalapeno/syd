---
# gobmp-nats: a GoBMP instance in the syd namespace that publishes to NATS
# JetStream for syd's bmpcollector. Uses the official gobmp:latest image which
# includes NATS publisher support.
#
# syd runs its own gobmp-nats on NodePort 30512, independent of any Jalapeno
# deployment. Configure routers to send BMP to <node-ip>:30512.
# (Jalapeno's Kafka-based gobmp uses NodePort 30511.)
apiVersion: v1
kind: Service
metadata:
  name: gobmp-nats
  namespace: syd
spec:
  selector:
    app: gobmp-nats
  ports:
    - name: bmp
      port: 5001
      targetPort: 5001
      nodePort: 30512
      protocol: TCP
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gobmp-nats
  namespace: syd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gobmp-nats
  template:
    metadata:
      labels:
        app: gobmp-nats
    spec:
      containers:
        - name: gobmp-nats
          image: docker.io/sbezverk/gobmp:latest
          imagePullPolicy: Always
          args:
            - --v
            - "5"
            - --source-port
            - "5001"
            - --nats-server
            - nats://nats:4222
          ports:
            - containerPort: 5001
              protocol: TCP
              name: bmp
