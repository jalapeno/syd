---
# gobmp-nats: a GoBMP instance in the syd namespace that publishes to NATS
# JetStream for syd's bmpcollector. Uses the official gobmp:latest image which
# includes NATS publisher support.
#
# NOTE: If Jalapeno is co-deployed on the same cluster, its gobmp-nats already
# occupies NodePort 30512. In that case, disable this manifest and instead set
# NATS_URL in configmap.yaml to nats://nats.jalapeno.svc.cluster.local:4222 so
# syd shares the existing gobmp-nats stream rather than running a duplicate.
apiVersion: v1
kind: Service
metadata:
  name: gobmp-nats
  namespace: syd
spec:
  selector:
    app: gobmp-nats
  ports:
    - name: bmp
      port: 5001
      targetPort: 5001
      nodePort: 30512
      protocol: TCP
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gobmp-nats
  namespace: syd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gobmp-nats
  template:
    metadata:
      labels:
        app: gobmp-nats
    spec:
      containers:
        - name: gobmp-nats
          image: docker.io/sbezverk/gobmp:latest
          imagePullPolicy: Always
          args:
            - --v
            - "5"
            - --source-port
            - "5001"
            - --nats-server
            - nats://nats:4222
          ports:
            - containerPort: 5001
              protocol: TCP
              name: bmp
